<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #020617;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
        }
    </style>
</head>
<body>

<h2>🔐 Login</h2>

<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>

<button onclick="login()">Login</button>

<script>
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === "admin" && p === "1234") {
        window.location.href = "index.html";
    } else {
        alert("Wrong credentials");
    }
}
</script>

</body>
</html>
